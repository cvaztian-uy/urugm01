name: Compilar APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Java (para Gradle/Android)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Instalar dependencias
        run: npm install

      - name: Descargar el banco de sonidos SF2 (pesa 32MB, no va en el repo)
        run: |
          mkdir -p www/sf2
          curl -L -o www/sf2/GeneralUser-GS.sf2 "https://raw.githubusercontent.com/mrbumpy409/GeneralUser-GS/main/GeneralUser-GS.sf2"

      - name: Sincronizar Capacitor con Android
        run: npx cap sync android

      - name: Dar permiso de ejecución a Gradle
        run: chmod +x android/gradlew

      - name: Compilar APK (debug, instalable directo)
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Subir el APK como resultado descargable
        uses: actions/upload-artifact@v4
        with:
          name: URUGM01-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
